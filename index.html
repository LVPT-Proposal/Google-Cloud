<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Executive Poker Experience | Google Cloud SMB Demand Gen</title>
  <meta name="description" content="Strategic poker engagement for Global Google Cloud Demand Generation - SMB.">
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
  <style>
    /* =========================================================
       BLOCK 1 START - RESET, CLOUDS, GLOBAL
    ========================================================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gc-blue: #1A73E8;
      --gc-red: #E94235;
      --gc-yellow: #FBBC04;
      --gc-green: #34A853;
      --navy-deep: #0B1424;
      --navy-card: rgba(18, 28, 45, 0.75);
      --white: #FFFFFF;
      --gold: #d4af37;
      --border-light: rgba(255,255,255,0.08);
      --shadow-lg: 0 25px 40px -12px rgba(0,0,0,0.4);
      --transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--navy-deep);
      color: var(--white);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }
    h1 { font-size: clamp(2.2rem, 8vw, 4.5rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
    h2 { font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 700; letter-spacing: -0.02em; }
    h3 { font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: 600; }
    p, li { font-size: clamp(0.95rem, 2vw, 1.05rem); }
    .container {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 clamp(1rem, 5vw, 2.5rem);
    }
    section {
      position: relative;
      padding: clamp(3rem, 8vh, 5rem) 0;
      width: 100%;
    }
    /* ICON STYLES */
    .icon-gold {
      color: var(--gold);
      margin-right: 10px;
      font-size: 1.2em;
      vertical-align: middle;
      transition: transform 0.3s ease;
    }
    .icon-white {
      color: var(--white);
      margin-right: 10px;
      font-size: 1.2em;
      vertical-align: middle;
    }
    .event-meta span:hover .icon-gold {
      transform: scale(1.15);
    }

    /* ----- REAL SVG CLOUDS (using user-provided SVG) ----- */
    #background-wrap {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      overflow: hidden;
    }
    .cloud {
      width: 400px;
      height: 200px;
      background-image: url('https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69e24ee9c56ad27908680ffa.svg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
      opacity: 0.45;
    }
    .cloud:after, .cloud:before {
      display: none;
    }
    .x1, .x2, .x3, .x4, .x5 {
      position: absolute;
      animation: animateCloud linear infinite;
    }
    .x1 { animation-duration: 55s; transform: scale(0.7); top: 5%; }
    .x2 { animation-duration: 35s; transform: scale(0.45); top: 20%; }
    .x3 { animation-duration: 45s; transform: scale(0.6); top: 55%; }
    .x4 { animation-duration: 28s; transform: scale(0.35); top: 75%; }
    .x5 { animation-duration: 60s; transform: scale(0.8); top: 40%; }
    @keyframes animateCloud {
      0% { left: -500px; }
      100% { left: 110%; }
    }
    /* BLOCK 1 END */

    /* BLOCK 2 START - REVEAL, CARDS, BUTTONS */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .glass-panel {
      background: rgba(18, 28, 45, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-light);
      border-radius: clamp(1.8rem, 4vw, 3rem);
      box-shadow: var(--shadow-lg);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid transparent;
      text-decoration: none;
      font-size: clamp(0.9rem, 2vw, 1rem);
    }
    .btn-primary {
      background: var(--gc-blue);
      color: white;
      box-shadow: 0 10px 20px -5px rgba(26,115,232,0.3);
    }
    .btn-primary:hover { background: #1557b0; transform: translateY(-2px); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.25);
      color: white;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.5); }
    /* BLOCK 2 END */

    /* BLOCK 3 START - HEADER */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(0.8rem, 3vw, 1.5rem) 0;
      flex-wrap: wrap;
    }
    .logo-area { display: flex; align-items: center; gap: 12px; }
    .gc-logo-svg { height: 32px; width: auto; }
    .group-badge {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.1);
      white-space: nowrap;
    }
    /* mobile badge reposition */
    .mobile-badge-wrap {
      display: none;
    }
    @media (max-width: 600px) {
      .navbar .group-badge {
        display: none;
      }
      .mobile-badge-wrap {
        display: block;
        margin-top: 0.5rem;
      }
      .mobile-badge-wrap .group-badge {
        display: inline-block;
        white-space: nowrap;
      }
    }
    /* BLOCK 3 END */

    /* BLOCK 4 START - OPTION CARDS */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(1.5rem, 4vw, 2.5rem);
    }
    .option-card {
      background: var(--navy-card);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: clamp(1.8rem, 4vw, 2.5rem);
      border: 1px solid rgba(255,255,255,0.08);
      transition: var(--transition);
    }
    .price-total { font-size: 2.2rem; font-weight: 800; }
    .addon-group {
      margin: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 0;
    }
    .checkbox-item input {
      width: 1.2rem; height: 1.2rem; accent-color: var(--gc-blue);
    }
    .bullet-list {
      list-style: none;
      margin: 1.2rem 0;
    }
    .bullet-list li {
      margin-bottom: 0.5rem;
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
    }
    .bullet-list li i {
      color: var(--gold);
      font-size: 0.9rem;
      width: 1.2rem;
      text-align: center;
    }
    .event-meta {
      display: flex;
      gap: 25px;
      justify-content: flex-start;
      flex-wrap: wrap;
      font-weight: 500;
      margin-top: 20px;
    }
    .flow-steps { 
      display: grid; 
      grid-template-columns: repeat(4,1fr); 
      gap: 1rem; 
      text-align: center;
    }
    .step { 
      padding: 1.5rem 0.5rem; 
      background: rgba(255,255,255,0.02); 
      border-radius: 24px; 
    }
    .step h4 { margin: 0.8rem 0 0.4rem; }
    .step p { font-size: 0.9rem; opacity: 0.8; }
    .pro-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 2rem; }
    .pro-card { background: rgba(255,255,255,0.03); border-radius: 28px; padding: 2rem 1rem; text-align: center; }
    .pro-img { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 1rem; overflow: hidden; border: 2px solid var(--gc-blue); }
    .pro-img img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem; }
    .gallery-item img { width: 100%; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    @media (max-width: 768px) {
      .cards-grid { grid-template-columns: 1fr; }
      .flow-steps { grid-template-columns: 1fr; }
      .pro-grid { grid-template-columns: 1fr; }
    }
    /* BLOCK 4 END */
  </style>
</head>
<body>
  <!-- SVG CLOUD BACKGROUND -->
  <div id="background-wrap">
    <div class="x1"><div class="cloud"></div></div>
    <div class="x2"><div class="cloud"></div></div>
    <div class="x3"><div class="cloud"></div></div>
    <div class="x4"><div class="cloud"></div></div>
    <div class="x5"><div class="cloud"></div></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    // BLOCK 5 START: HOOKS & UTILS
    const { useState, useEffect, useRef } = React;

    const useReveal = (threshold = 0.15) => {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) setVisible(true); },
          { threshold, rootMargin: '0px 0px -20px 0px' }
        );
        if (ref.current) observer.observe(ref.current);
        return () => { if (ref.current) observer.unobserve(ref.current); };
      }, [threshold]);
      return [ref, visible];
    };

    const useCountUp = (target, duration = 1200, shouldStart = true) => {
      const [count, setCount] = useState(0);
      useEffect(() => {
        if (!shouldStart) return;
        let startTimestamp;
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          const progress = Math.min((timestamp - startTimestamp) / duration, 1);
          setCount(Math.floor(progress * target));
          if (progress < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [target, duration, shouldStart]);
      return count;
    };

    const scrollToSection = (id) => document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
    // BLOCK 5 END

    // BLOCK 6 START: COMPONENTS
    const GoogleCloudLogo = () => (
      <img 
        src="https://assets.cdn.filesafe.space/E2BEbKIK8SvsJICq4vXY/media/69e23d12c56ad27908639c01.svg" 
        alt="Google Cloud" 
        className="gc-logo-svg" 
        style={{filter: 'brightness(0) invert(1)'}} 
      />
    );

    const RevealBlock = ({ children, className = '' }) => {
      const [ref, visible] = useReveal(0.1);
      return <div ref={ref} className={`reveal ${className} ${visible ? 'visible' : ''}`}>{children}</div>;
    };

    // Option Card with bullet points and updated text
    const OptionCard = ({ title, subtitle, basePrice, accentColor, isVenetian, onSelect }) => {
      const [ref, visible] = useReveal();
      const [addons, setAddons] = useState({ sprinter: false, waitress: false, bar: false });
      
      const addonTotal = (addons.sprinter ? 875 : 0) + (addons.waitress ? 550 : 0) + (addons.bar ? 700 : 0);
      const total = basePrice + (isVenetian ? addonTotal : 0);
      const countedTotal = useCountUp(total, 1200, visible);

      const handleCheck = (e) => {
        const { name, checked } = e.target;
        setAddons(prev => ({ ...prev, [name]: checked }));
      };

      const handleSelect = () => {
        const selectedAddons = isVenetian ? 
          Object.entries(addons).filter(([_,v])=>v).map(([k])=>k) : [];
        onSelect({ type: isVenetian ? 'venetian' : 'suite', basePrice, addons: selectedAddons, total });
        scrollToSection('cta-section');
      };

      return (
        <div ref={ref} className={`option-card reveal ${visible ? 'visible' : ''}`} style={{borderTop: `6px solid ${accentColor}`}}>
          <h3 style={{marginBottom:'0.5rem'}}>{title}</h3>
          <span className="badge" style={{background:`${accentColor}20`, color:accentColor, padding:'0.2rem 1rem'}}>{subtitle}</span>
          
          <ul className="bullet-list">
            {isVenetian ? (
              <>
                <li><i className="fa-regular fa-circle-check"></i> Kenna James or Jeff Madsen (based on availability)</li>
                <li><i className="fa-regular fa-circle-check"></i> Professional dealer, cards, chips & table for sit‑n‑gos</li>
                <li><i className="fa-regular fa-circle-check"></i> Full instruction: rules, strategy, psychology, tells</li>
              </>
            ) : (
              <>
                <li><i className="fa-regular fa-circle-check"></i> Kenna James or Jeff Madsen (based on availability)</li>
                <li><i className="fa-regular fa-circle-check"></i> Pro brings cards, chips & felt – transforms suite into poker table</li>
                <li><i className="fa-regular fa-circle-check"></i> Full instruction: rules, strategy, psychology, tells</li>
              </>
            )}
          </ul>
          
          <div className="price-total">${countedTotal.toLocaleString()}</div>
          
          {isVenetian && (
            <div className="addon-group">
              <label className="checkbox-item">
                <input type="checkbox" name="sprinter" checked={addons.sprinter} onChange={handleCheck} /> 
                <i className="fa-solid fa-van-shuttle icon-gold"></i> Round Trip Sprinter — $875
              </label>
              <label className="checkbox-item">
                <input type="checkbox" name="waitress" checked={addons.waitress} onChange={handleCheck} /> 
                <i className="fa-solid fa-bell-concierge icon-gold"></i> Private Waitress — $550
              </label>
              <label className="checkbox-item">
                <input type="checkbox" name="bar" checked={addons.bar} onChange={handleCheck} /> 
                <i className="fa-solid fa-champagne-glasses icon-gold"></i> Open Bar — $700
              </label>
            </div>
          )}

          {isVenetian && (
            <div style={{marginTop:'1.2rem', padding:'1rem', background:'rgba(255,255,255,0.03)', borderRadius:'16px'}}>
              <p style={{marginBottom:'0.5rem', fontWeight:600}}>
                <i className="fa-regular fa-credit-card icon-gold"></i> Buy‑in per person
              </p>
              <p style={{fontSize:'0.95rem', opacity:0.8}}>
                We suggest $50–$100 per player per sit‑n‑go. Let us know your preferred amount and we’ll handle invoicing upfront — no cash needed at the table.
              </p>
            </div>
          )}

          <button className="btn btn-primary" style={{marginTop:'1.5rem', background:accentColor}} onClick={handleSelect}>
            Select {title.split(' ')[0]} Experience
          </button>
          <p style={{marginTop:'0.8rem', fontSize:'0.85rem', opacity:0.6}}>Kenna James or Jeff Madsen: included</p>
        </div>
      );
    };

    const HandAnalysis = () => (
      <div className="glass-panel" style={{padding: 'clamp(1.8rem, 5vw, 3rem)'}}>
        <h3><i className="fa-solid fa-code icon-gold"></i> What is Hand Analysis?</h3>
        <p style={{fontSize:'1.1rem', marginTop:'1rem'}}>
          Imagine a senior engineer reviewing your code in real time — pointing out optimizations, flagging edge cases, and suggesting cleaner logic. 
          Our pros do exactly that at the table: they break down every decision, reveal missed opportunities, and sharpen your strategic thinking.
        </p>
      </div>
    );
    // BLOCK 6 END

    // BLOCK 7 START: MAIN APP
    const App = () => {
      const [selectedExperience, setSelectedExperience] = useState(null);

      const handleSelect = (exp) => setSelectedExperience(exp);

      const generateMailto = () => {
        if (!selectedExperience) return '#';
        const subject = `Executive Poker Experience - ${selectedExperience.type.toUpperCase()}`;
        const body = `Selected: ${selectedExperience.type} Experience\nTotal: $${selectedExperience.total.toLocaleString()}\n` +
          (selectedExperience.addons?.length ? `Add-ons: ${selectedExperience.addons.join(', ')}\n` : '') +
          `Date: April 21, 3:30–6:00 PM\nExecutives: 7\n\nPlease send invoice to lock in date.`;
        return `mailto:book@pokertraininglasvegas.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      };

      const pros = [
        { name: 'Kenna James', role: '20+ yrs teaching', stats: ['260+ cashes', '22 wins', '$4.2M+'], img: 'https://www.gamblinginsider.com/img/news/kenna-james-ape-in-poker-partnership.jpg' },
        { name: 'Jeff Madsen', role: '10+ yrs teaching', stats: ['4 WSOP bracelets', 'WSOP POY', '$7M+'], img: 'https://www.seminolehardrockpokeropen.com/wp-content/uploads/2022/01/2022-LHPO-Jeff-Madsen.jpg' },
        { name: 'Nick Pupillo', role: 'WSOP bracelet', stats: ['Circuit titles', '$6.3M+', 'Elite coach'], img: 'https://s.pnimg.net/9BAfDHPTszjJnQoJZKBseCj5xEK867L6gzAhY0EdeC0/pr:article-leading-desktop-2x/aHR0cHM6Ly9wbmlt/Zy5uZXQvdy9hcnRp/Y2xlcy8wLzY0OS84/MTNmNDJhOWI4Lmpw/Zw.webp' }
      ];

      return (
        <div>
          <header style={{borderBottom:'1px solid rgba(255,255,255,0.05)'}}>
            <div className="container">
              <div className="navbar">
                <div className="logo-area">
                  <GoogleCloudLogo />
                  <span style={{fontWeight:500, opacity:0.8}}></span>
                </div>
                <div className="group-badge desktop-only"><i className="fa-solid fa-user-group icon-white"></i> 7 execs · Apr 21</div>
              </div>
            </div>
          </header>

          <main>
            {/* HERO */}
            <section>
              <div className="container">
                <RevealBlock>
                  <div className="badge" style={{marginBottom:'0.5rem'}}>Global Google Cloud · SMB Demand Generation</div>
                  <div className="mobile-badge-wrap">
                    <span className="group-badge"><i className="fa-solid fa-user-group icon-white"></i> 7 execs · Apr 21</span>
                  </div>
                  <h1 style={{marginTop:'0.5rem'}}>Executive Poker<br/><span style={{background:'linear-gradient(145deg, #6ab0fe, #fff)', WebkitBackgroundClip:'text', color:'transparent'}}>Engagement.</span></h1>
                  <p style={{fontSize:'clamp(1.1rem, 3vw, 1.5rem)', maxWidth:'700px', opacity:0.9}}>
                    High‑engagement, strategy‑driven experience for teams building pipelines.
                  </p>
                  <div className="event-meta">
                    <span><i className="fa-solid fa-calendar-days icon-gold"></i> April 21</span>
                    <span><i className="fa-solid fa-clock icon-gold"></i> 3:30–6:00 PM</span>
                    <span className="desktop-only"><i className="fa-solid fa-user-group icon-gold"></i> 7 Executives</span>
                  </div>
                  <div style={{display:'flex', gap:'1rem', flexWrap:'wrap', marginTop:'2rem'}}>
                    <button className="btn btn-primary" onClick={() => scrollToSection('options')}>Explore options</button>
                    <button className="btn btn-outline" onClick={() => scrollToSection('investment')}>Review investment</button>
                  </div>
                </RevealBlock>
              </div>
            </section>

            {/* Executive Brief */}
            <section>
              <div className="container">
                <RevealBlock>
                  <div className="glass-panel" style={{padding:'clamp(2rem,5vw,4rem)'}}>
                    <h2>For a team that creates demand & drives engagement.</h2>
                    <p style={{fontSize:'1.2rem'}}>This experience mirrors strategic thinking, reading signals, and premium execution.</p>
                  </div>
                </RevealBlock>
              </div>
            </section>

            {/* Options */}
            <section id="options">
              <div className="container">
                <RevealBlock><h2 style={{marginBottom:'2rem'}}>Two curated formats</h2></RevealBlock>
                <div className="cards-grid">
                  <OptionCard 
                    title="Suite Experience"
                    subtitle="Private & seamless"
                    basePrice={3500}
                    accentColor="#1A73E8"
                    isVenetian={false}
                    onSelect={handleSelect}
                  />
                  <OptionCard 
                    title="Venetian Experience"
                    subtitle="VIP immersive"
                    basePrice={6500}
                    accentColor="#E94235"
                    isVenetian={true}
                    onSelect={handleSelect}
                  />
                </div>
                <p style={{marginTop:'1rem', opacity:0.7}}>
                  <i className="fa-solid fa-building icon-gold"></i> If the private studio room is available, we will book you in there for the Venetian training.
                </p>
              </div>
            </section>

            {/* Hand Analysis */}
            <section>
              <div className="container"><RevealBlock><HandAnalysis /></RevealBlock></div>
            </section>

            {/* Flow — with centered titles and subtext */}
            <section>
              <div className="container">
                <RevealBlock>
                  <h2 style={{marginBottom:'2rem', textAlign:'center'}}>Experience flow</h2>
                  <div className="flow-steps">
                    <div className="step">
                      <div style={{width:'48px',height:'48px',background:'var(--gc-blue)',borderRadius:'30px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'bold'}}>1</div>
                      <h4>Arrival & setup</h4>
                      <p>Premium environment ready</p>
                    </div>
                    <div className="step">
                      <div style={{width:'48px',height:'48px',background:'var(--gc-red)',borderRadius:'30px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'bold'}}>2</div>
                      <h4>Live instruction</h4>
                      <p>90‑minutes of hand analysis with pro</p>
                    </div>
                    <div className="step">
                      <div style={{width:'48px',height:'48px',background:'var(--gc-yellow)',borderRadius:'30px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'bold',color:'#000'}}>3</div>
                      <h4>Confidence Check</h4>
                      <p>2 sit‑n‑gos (40‑45 mins each)</p>
                    </div>
                    <div className="step">
                      <div style={{width:'48px',height:'48px',background:'var(--gc-green)',borderRadius:'30px',margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'bold'}}>4</div>
                      <h4>Peak engagement</h4>
                      <p>Energy, competition & connection</p>
                    </div>
                  </div>
                </RevealBlock>
              </div>
            </section>

            {/* Pros */}
            <section>
              <div className="container">
                <RevealBlock>
                  <h2 style={{textAlign:'center'}}>World‑class instruction</h2>
                  <p style={{marginBottom:'2rem', textAlign:'center'}}>We assign the optimal pro based on group dynamic & availability.</p>
                  <div className="pro-grid">
                    {pros.map((p,i)=>(
                      <div key={i} className="pro-card">
                        <div className="pro-img"><img src={p.img} alt={p.name} /></div>
                        <h3>{p.name}</h3>
                        <p style={{color:'var(--gc-blue)'}}>{p.role}</p>
                        <div style={{display:'flex', flexWrap:'wrap', gap:'0.3rem', justifyContent:'center'}}>
                          {p.stats.map((s,idx)=><span key={idx} className="badge" style={{background:'rgba(255,255,255,0.1)'}}>{s}</span>)}
                        </div>
                      </div>
                    ))}
                  </div>
                </RevealBlock>
              </div>
            </section>

            {/* Gallery */}
            <section>
              <div className="container">
                <RevealBlock>
                  <h2 style={{marginBottom:'1.5rem', textAlign:'center'}}>Live experience snapshots</h2>
                  <div className="gallery-grid">
                    <div className="gallery-item"><img src="https://storage.googleapis.com/msgsndr/E2BEbKIK8SvsJICq4vXY/media/69329adbe0f092644fb65b71.jpg" alt="event" /></div>
                    <div className="gallery-item"><img src="https://storage.googleapis.com/msgsndr/E2BEbKIK8SvsJICq4vXY/media/693b4f0f5b7f6413a3defc1e.jpg" alt="venetian" /></div>
                  </div>
                </RevealBlock>
              </div>
            </section>

            {/* Investment */}
            <section id="investment">
              <div className="container">
                <RevealBlock>
                  <div className="glass-panel" style={{padding:'clamp(2rem,5vw,3.5rem)', textAlign:'center'}}>
                    <h3>Investment at a glance</h3>
                    <div style={{display:'flex', justifyContent:'center', gap:'3rem', margin:'2rem 0', flexWrap:'wrap'}}>
                      <div><span style={{opacity:0.7}}>Suite</span> <strong style={{fontSize:'2rem'}}>$3,500</strong></div>
                      <div><span style={{opacity:0.7}}>Venetian</span> <strong style={{fontSize:'2rem'}}>$6,500</strong> <span style={{opacity:0.6}}>+ add‑ons</span></div>
                    </div>
                  </div>
                </RevealBlock>
              </div>
            </section>

            {/* CTA */}
            <section id="cta-section">
              <div className="container">
                <RevealBlock>
                  <div className="glass-panel" style={{padding:'clamp(2.5rem,6vw,4rem)', textAlign:'center'}}>
                    <h2>Ready to lock in April 21?</h2>
                    {selectedExperience ? (
                      <>
                        <p style={{margin:'1.5rem 0'}}>Selected: <strong>{selectedExperience.type} Experience</strong> — ${selectedExperience.total.toLocaleString()}</p>
                        <a href={generateMailto()} className="btn btn-primary" style={{margin:'1rem'}}><i className="fa-regular fa-envelope"></i> Reserve Experience (Email)</a>
                      </>
                    ) : (
                      <p style={{margin:'1.5rem 0'}}>Select an experience above to proceed.</p>
                    )}
                    <p style={{marginTop:'2rem', fontSize:'0.95rem', opacity:0.8}}>
                      Because of the short timeframe, we'll immediately send a click‑to‑pay invoice. Once paid, your date is locked. Within 24h you'll receive the pro name (most likely Kenna or Jeff).
                    </p>
                  </div>
                </RevealBlock>
              </div>
            </section>
          </main>

          <footer style={{padding:'2rem', textAlign:'center', borderTop:'1px solid rgba(255,255,255,0.05)'}}>
            <GoogleCloudLogo />
            <p style={{marginTop:'1rem', opacity:0.5}}>Global Google Cloud Demand Generation — SMB</p>
          </footer>
        </div>
      );
    };
    // BLOCK 7 END

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
