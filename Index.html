<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Executive Poker Experience | Google Cloud SMB Demand Gen</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- React & ReactDOM from CDN (lightweight, for CodePen style) -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    /* BLOCK 1 START: RESET & GLOBAL VARIABLES */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Google Cloud inspired palette — refined & premium */
      --gc-blue: #1A73E8;
      --gc-red: #E94235;
      --gc-yellow: #FBBC04;
      --gc-green: #34A853;
      --gc-navy: #1E2C3A;
      --gc-charcoal: #2A3B4C;
      --soft-white: #F8F9FC;
      --pure-white: #FFFFFF;
      --border-light: rgba(0,0,0,0.05);
      --shadow-sm: 0 8px 20px rgba(0,0,0,0.04), 0 2px 6px rgba(0,0,0,0.02);
      --shadow-md: 0 20px 35px -8px rgba(0,0,0,0.08), 0 8px 18px -6px rgba(0,0,0,0.05);
      --shadow-lift: 0 30px 45px -12px rgba(26, 115, 232, 0.12);
      --transition-smooth: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--pure-white);
      color: var(--gc-navy);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* clamp-based fluid scaling */
    h1 { font-size: clamp(2.4rem, 8vw, 4.5rem); font-weight: 700; letter-spacing: -0.02em; }
    h2 { font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 600; letter-spacing: -0.015em; }
    h3 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 600; }
    p  { font-size: clamp(1rem, 2.5vw, 1.125rem); }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 clamp(1.25rem, 5vw, 3rem);
      width: 100%;
    }

    /* Edge-to-edge mobile sections */
    section {
      padding: clamp(3rem, 8vh, 6rem) 0;
      position: relative;
    }

    /* BLOCK 1 END */

    /* BLOCK 2 START: UTILITY CLASSES & ANIMATIONS */
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .badge {
      display: inline-block;
      background: rgba(26, 115, 232, 0.08);
      color: var(--gc-blue);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      letter-spacing: 0.01em;
      border: 1px solid rgba(26,115,232,0.12);
    }

    .glass-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: clamp(1.5rem, 3vw, 2.5rem);
      box-shadow: var(--shadow-md);
    }

    /* BLOCK 2 END */

    /* BLOCK 3 START: HEADER / LOGO & NAV */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(1rem, 3vw, 1.8rem) 0;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .gc-logo {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gc-icon {
      display: flex;
      gap: 3px;
    }
    .gc-icon span {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }
    .gc-icon span:nth-child(1) { background: var(--gc-blue); }
    .gc-icon span:nth-child(2) { background: var(--gc-red); }
    .gc-icon span:nth-child(3) { background: var(--gc-yellow); }
    .gc-icon span:nth-child(4) { background: var(--gc-green); }
    .logo-text {
      font-weight: 600;
      font-size: 1.3rem;
      color: var(--gc-navy);
      letter-spacing: -0.01em;
    }
    .group-badge {
      background: var(--gc-navy);
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.9rem;
      font-weight: 500;
    }

    /* Buttons */
    .btn-primary {
      background: var(--gc-blue);
      color: white;
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 8px 18px -6px rgba(26,115,232,0.3);
      transition: var(--transition-smooth);
      border: 1px solid rgba(255,255,255,0.1);
      display: inline-block;
      text-decoration: none;
    }
    .btn-primary:hover {
      background: #1557b0;
      transform: translateY(-3px);
      box-shadow: 0 18px 25px -10px var(--gc-blue);
    }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--gc-navy);
      color: var(--gc-navy);
      padding: 0.9rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .btn-outline:hover {
      background: var(--gc-navy);
      color: white;
    }
    /* BLOCK 3 END */

    /* BLOCK 4 START: HERO */
    .hero {
      padding: clamp(2rem, 6vh, 5rem) 0 clamp(3rem, 8vh, 6rem);
    }
    .hero-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .hero h1 span {
      background: linear-gradient(145deg, var(--gc-blue) 0%, var(--gc-red) 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero-cta-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
    }

    /* Option Cards */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(1.5rem, 4vw, 2.5rem);
    }
    .option-card {
      background: var(--pure-white);
      border-radius: 2rem;
      padding: clamp(1.8rem, 4vw, 2.5rem);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      transition: var(--transition-smooth);
      display: flex;
      flex-direction: column;
    }
    .option-card:hover {
      box-shadow: var(--shadow-lift);
      border-color: rgba(26,115,232,0.15);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .price-total {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--gc-navy);
    }
    .breakdown-list {
      margin: 1.8rem 0;
      border-top: 1px solid #edf2f7;
      padding-top: 1.5rem;
    }
    .breakdown-item {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      font-size: 1rem;
    }
    .expand-trigger {
      background: none;
      border: none;
      color: var(--gc-blue);
      font-weight: 600;
      cursor: pointer;
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
    }

    /* Investment highlight */
    .totals-showcase {
      display: flex;
      justify-content: center;
      gap: clamp(2rem, 8vw, 5rem);
      flex-wrap: wrap;
    }
    .total-pill {
      background: linear-gradient(135deg, #f1f5fe 0%, #ffffff 100%);
      padding: 1.2rem 3rem;
      border-radius: 100px;
      border-left: 6px solid var(--gc-blue);
    }

    /* Flow steps */
    .flow-steps {
      display: grid;
      grid-template-columns: repeat(5,1fr);
      gap: 1rem;
    }
    .step {
      text-align: center;
      padding: 1.2rem 0.5rem;
    }

    /* Sticky mobile CTA */
    .mobile-sticky-cta {
      display: none;
    }

    @media (max-width: 768px) {
      .cards-grid { grid-template-columns: 1fr; }
      .flow-steps { grid-template-columns: 1fr; gap: 0.5rem; }
      .mobile-sticky-cta {
        display: block;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(20px);
        padding: 1rem;
        border-top: 1px solid rgba(0,0,0,0.05);
        z-index: 100;
        box-shadow: 0 -8px 20px rgba(0,0,0,0.04);
      }
    }

    /* BLOCK 4 END */
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // BLOCK 5 START: REACT APP & HOOKS
    const { useState, useEffect, useRef } = React;

    // Custom hook: Intersection Observer for reveal animations
    const useReveal = (threshold = 0.15) => {
      const ref = useRef(null);
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) setVisible(true); },
          { threshold, rootMargin: '0px 0px -20px 0px' }
        );
        if (ref.current) observer.observe(ref.current);
        return () => { if (ref.current) observer.unobserve(ref.current); };
      }, [threshold]);
      return [ref, visible];
    };

    // Custom hook: Count-up effect for totals
    const useCountUp = (target, duration = 1200, start = 0, shouldStart = true) => {
      const [count, setCount] = useState(start);
      useEffect(() => {
        if (!shouldStart) return;
        let startTimestamp;
        const step = (timestamp) => {
          if (!startTimestamp) startTimestamp = timestamp;
          const progress = Math.min((timestamp - startTimestamp) / duration, 1);
          setCount(Math.floor(progress * (target - start) + start));
          if (progress < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      }, [target, duration, start, shouldStart]);
      return count;
    };

    // Smooth scroll function
    const scrollToSection = (id) => {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    // BLOCK 5 END

    // BLOCK 6 START: COMPONENTS
    const GoogleCloudLogo = () => (
      <div className="gc-logo">
        <div className="gc-icon">
          <span></span><span></span><span></span><span></span>
        </div>
        <span className="logo-text">Google Cloud</span>
      </div>
    );

    // Expandable breakdown component for cards
    const ExpandableBreakdown = ({ items, total }) => {
      const [expanded, setExpanded] = useState(false);
      return (
        <div>
          <button className="expand-trigger" onClick={() => setExpanded(!expanded)}>
            {expanded ? '− Hide full breakdown' : '+ See full breakdown'}
          </button>
          {expanded && (
            <div className="breakdown-list">
              {items.map((item, idx) => (
                <div key={idx} className="breakdown-item">
                  <span>{item.label}</span>
                  <span style={{fontWeight:600}}>${item.value.toLocaleString()}</span>
                </div>
              ))}
              <div className="breakdown-item" style={{borderTop:'1px dashed #ccc', marginTop:'8px', paddingTop:'12px'}}>
                <strong>Total</strong>
                <strong>${total.toLocaleString()}</strong>
              </div>
            </div>
          )}
        </div>
      );
    };

    // Option Card
    const OptionCard = ({ title, subtitle, features, lineItems, total, ctaLabel, accentColor }) => {
      const [ref, visible] = useReveal(0.1);
      const countedTotal = useCountUp(total, 1500, 0, visible);
      return (
        <div ref={ref} className={`option-card reveal ${visible ? 'visible' : ''}`} style={{borderTop: `6px solid ${accentColor}`}}>
          <div className="card-header">
            <h3>{title}</h3>
            <span className="badge" style={{background:`${accentColor}10`, color:accentColor}}>{subtitle}</span>
          </div>
          <p style={{marginBottom:'1.5rem', color:'#3a4a5c'}}>{features}</p>
          <div className="price-total">${countedTotal.toLocaleString()}</div>
          <ExpandableBreakdown items={lineItems} total={total} />
          <button className="btn-primary" style={{marginTop:'1.8rem', background:accentColor, boxShadow:`0 8px 18px -6px ${accentColor}80`}} onClick={() => scrollToSection('cta-section')}>
            {ctaLabel}
          </button>
        </div>
      );
    };

    // Reveal Wrapper
    const RevealBlock = ({ children, className = '' }) => {
      const [ref, visible] = useReveal(0.15);
      return (
        <div ref={ref} className={`reveal ${className} ${visible ? 'visible' : ''}`}>
          {children}
        </div>
      );
    };

    // BLOCK 6 END

    // BLOCK 7 START: MAIN APP
    const App = () => {
      const suiteLineItems = [
        { label: 'Kenna (90 min private instruction)', value: 3000 },
        { label: 'Premium cards, chips & felt (included)', value: 0 },
      ];
      const venetianLineItems = [
        { label: 'Private Poker Room (90 min)', value: 3500 },
        { label: 'Professional Dealer', value: 2500 },
        { label: 'Kenna (Poker Pro & Host)', value: 2500 },
        { label: 'Sprinter Van Transportation', value: 850 },
        { label: 'Private Waitress', value: 1000 },
      ];

      return (
        <div style={{overflow:'hidden'}}>
          {/* Header */}
          <header style={{padding: 'clamp(0.8rem, 2vw, 1.5rem) 0'}} className="container">
            <div className="navbar">
              <div className="logo-area">
                <GoogleCloudLogo />
                <div style={{marginLeft:'12px', height:'24px', width:'1px', background:'#ddd'}}></div>
                <span style={{fontWeight:500, fontSize:'0.95rem', color:'var(--gc-charcoal)'}}>Demand Gen · SMB</span>
              </div>
              <div className="group-badge">7 executives</div>
            </div>
          </header>

          <main>
            {/* HERO SECTION */}
            <section className="hero container">
              <RevealBlock>
                <div className="hero-grid">
                  <div className="badge" style={{marginBottom:'0.5rem'}}>Global Google Cloud · SMB Demand Generation</div>
                  <h1>Strategic engagement, <br/><span>elevated.</span></h1>
                  <p style={{fontSize:'clamp(1.2rem, 3vw, 1.5rem)', maxWidth:'780px', color:'#2e4053'}}>
                    A premium poker experience designed for a team that builds pipeline, drives growth, and values high‑impact interaction.
                  </p>
                  <div className="hero-cta-group">
                    <button className="btn-primary" onClick={() => scrollToSection('options')}>Explore experience options</button>
                    <button className="btn-outline" onClick={() => scrollToSection('investment')}>Review investment</button>
                    <button className="btn-outline" onClick={() => scrollToSection('cta-section')}>Reserve preferred format</button>
                  </div>
                </div>
              </RevealBlock>
            </section>

            {/* EXECUTIVE PITCH */}
            <section className="container" style={{paddingTop:'1rem'}}>
              <RevealBlock>
                <div style={{background: 'linear-gradient(145deg, #f0f5ff 0%, #ffffff 70%)', padding: 'clamp(2rem, 6vw, 4rem)', borderRadius: '2.5rem'}}>
                  <h2 style={{color:'var(--gc-navy)'}}>For a team focused on creating demand, driving engagement, and building momentum.</h2>
                  <p style={{marginTop:'1.5rem', fontSize:'1.2rem', maxWidth:'900px'}}>
                    This is more than poker. It’s a live, high-touch environment that mirrors the strategic thinking, relationship building, and premium execution you bring to SMB audiences every day.
                  </p>
                </div>
              </RevealBlock>
            </section>

            {/* EXPERIENCE OVERVIEW */}
            <section className="container">
              <RevealBlock>
                <h2 style={{marginBottom:'1.5rem'}}>Interactive · Premium · Unforgettable</h2>
                <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'2rem', alignItems:'center'}} className="cards-grid">
                  <div>
                    <p style={{fontSize:'1.2rem'}}>Kenna delivers a 90‑minute guided poker experience that blends strategic instruction with genuine connection. Perfect for executive teams seeking an alternative to standard dinners.</p>
                    <div style={{marginTop:'2rem', display:'flex', gap:'1rem', flexWrap:'wrap'}}>
                      <span className="badge">Strategic thinking</span>
                      <span className="badge">Reading the room</span>
                      <span className="badge">Premium hospitality</span>
                    </div>
                  </div>
                  <div style={{background:'#1E2C3A', padding:'1.8rem', borderRadius:'2rem', color:'white'}}>
                    <p style={{fontStyle:'italic'}}>“An elevated group experience that sparks conversation and camaraderie — exactly what high‑performing teams need.”</p>
                  </div>
                </div>
              </RevealBlock>
            </section>

            {/* OPTIONS SECTION (interactive cards) */}
            <section id="options" className="container" style={{paddingBottom:'2rem'}}>
              <RevealBlock>
                <h2 style={{marginBottom:'2.5rem'}}>Two curated formats</h2>
              </RevealBlock>
              <div className="cards-grid">
                <OptionCard 
                  title="Suite Experience"
                  subtitle="Seamless & private"
                  features="Kenna brings the full setup to your suite. No travel, maximum convenience."
                  lineItems={suiteLineItems}
                  total={3000}
                  ctaLabel="Select Suite Experience"
                  accentColor="#1A73E8"
                />
                <OptionCard 
                  title="Venetian Poker Room"
                  subtitle="Flagship immersive"
                  features="VIP access, dedicated dealer, transportation — the ultimate executive poker experience."
                  lineItems={venetianLineItems}
                  total={10350}
                  ctaLabel="Select Venetian Experience"
                  accentColor="#E94235"
                />
              </div>
            </section>

            {/* INVESTMENT / PRICING HIGHLIGHT */}
            <section id="investment" className="container" style={{paddingTop:'1rem'}}>
              <RevealBlock>
                <div className="glass-card" style={{padding:'clamp(2rem, 5vw, 4rem)', textAlign:'center'}}>
                  <h3 style={{marginBottom:'2rem'}}>Investment overview</h3>
                  <div className="totals-showcase">
                    <div className="total-pill">
                      <span style={{fontSize:'1rem', opacity:0.7}}>Suite Experience</span>
                      <div style={{fontSize:'2.8rem', fontWeight:700}}>$3,000</div>
                    </div>
                    <div className="total-pill" style={{borderLeftColor:'var(--gc-red)'}}>
                      <span style={{fontSize:'1rem', opacity:0.7}}>Venetian Experience</span>
                      <div style={{fontSize:'2.8rem', fontWeight:700}}>$10,350</div>
                    </div>
                  </div>
                  <p style={{marginTop:'2rem', color:'#3e5368'}}>All-inclusive, no hidden fees. Flexible payment & concierge coordination.</p>
                </div>
              </RevealBlock>
            </section>

            {/* WHY THIS WORKS */}
            <section className="container">
              <RevealBlock>
                <h2 style={{marginBottom:'2rem'}}>Built for a demand generation mindset</h2>
                <div style={{display:'flex', flexWrap:'wrap', gap:'2rem'}}>
                  {['Strategic & social','Premium without pretense','Stronger than dinner','Real conversation catalyst','Memorable activation'].map((item,i) => (
                    <div key={i} style={{background:'white', padding:'1rem 2rem', borderRadius:'60px', boxShadow:'var(--shadow-sm)', border:'1px solid #eef2f6'}}>
                      <span style={{fontWeight:600}}>{item}</span>
                    </div>
                  ))}
                </div>
                <p style={{marginTop:'2.5rem', fontSize:'1.15rem'}}>For a team that lives and breathes audience engagement, this experience delivers the kind of high-value interaction that builds lasting relationships.</p>
              </RevealBlock>
            </section>

            {/* WHAT TO EXPECT / FLOW */}
            <section className="container">
              <RevealBlock>
                <h2 style={{marginBottom:'2rem'}}>What to expect</h2>
                <div className="flow-steps">
                  {['Arrival & welcome','Premium setup','Kenna’s instruction','Guided play & interaction','Polished finish'].map((step,i)=>(
                    <div key={i} className="step">
                      <div style={{width:'40px',height:'40px',background:`var(--gc-${i%2===0?'blue':'red'})`,borderRadius:'30px',margin:'0 auto 1rem',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontWeight:'bold'}}>{i+1}</div>
                      <h4 style={{fontSize:'1.1rem'}}>{step}</h4>
                    </div>
                  ))}
                </div>
              </RevealBlock>
            </section>

            {/* CTA / NEXT STEPS */}
            <section id="cta-section" className="container" style={{paddingBottom:'5rem'}}>
              <RevealBlock>
                <div style={{background:'var(--gc-navy)', color:'white', padding:'clamp(2.5rem, 8vw, 5rem)', borderRadius:'2.5rem', textAlign:'center'}}>
                  <h2 style={{color:'white'}}>Ready to create a standout moment?</h2>
                  <p style={{fontSize:'1.2rem', opacity:0.9, margin:'1.5rem 0 2.5rem'}}>Select your preferred format, and we’ll handle every detail.</p>
                  <div style={{display:'flex', gap:'1.5rem', justifyContent:'center', flexWrap:'wrap'}}>
                    <button className="btn-primary" style={{background:'white', color:'var(--gc-navy)', boxShadow:'none'}} onClick={() => scrollToSection('options')}>Finalize executive poker event</button>
                    <button className="btn-outline" style={{borderColor:'white', color:'white'}} onClick={() => scrollToSection('options')}>Reserve format →</button>
                  </div>
                </div>
              </RevealBlock>
            </section>
          </main>

          {/* Mobile Sticky CTA */}
          <div className="mobile-sticky-cta">
            <div style={{display:'flex', gap:'0.8rem', justifyContent:'center'}}>
              <button className="btn-primary" style={{padding:'0.8rem 1.5rem'}} onClick={() => scrollToSection('options')}>View options</button>
              <button className="btn-outline" style={{padding:'0.8rem 1.5rem'}} onClick={() => scrollToSection('cta-section')}>Reserve</button>
            </div>
          </div>

          {/* subtle footer */}
          <footer style={{padding:'2rem', textAlign:'center', borderTop:'1px solid #edf2f7'}}>
            <GoogleCloudLogo />
            <p style={{marginTop:'1rem', fontSize:'0.9rem', opacity:0.6}}>Global Google Cloud Demand Generation — SMB · Curated executive experience</p>
          </footer>
        </div>
      );
    };
    // BLOCK 7 END

    // Render
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
